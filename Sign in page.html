<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>SIGN UP TO KASARANI SCOUTS</title>
    <img src="logo.JPEG" alt="Kasarani Subcounty Scouts emblem featuring a red and white fleur-de-lis symbol centered on a mountainous landscape with green trees, a blue sky, sun, and clouds. The emblem is circled by text reading Kasarani Subcounty Scouts at the top and Be Prepared at the bottom, with gold wheat stalks on either side. Five colored sections within the circle list the scout sections: Kasarani in yellow, Claycity in white, Ruai in blue, Mwiki in orange, and Njiru in dark red, representing different scout groups within the organization." width="100" height="100" />
    <a href="home.html">HOME</a>
    <a href="about.html">ABOUT US</a>
  </head>
  <body>
    <h2>HELLO ARE YOU A SCOUT? SIGN UP TO KASARANI SCOUTS</h2>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required />
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required />
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required />
    <label for="confirm-password">Confirm Password:</label>
    <input
      type="password"
      id="confirm-password"
      name="confirm-password"
      required
    />
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" required />
    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" required />
    <label for="KSA registration no">REGISTRATION NO</label>
    <a href="Dashboard.html"><button type="submit">Sign Up</button></a>

  </body>

</html>
